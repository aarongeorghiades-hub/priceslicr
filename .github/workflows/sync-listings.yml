name: Sync Listings

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger eBay sync
        run: |
          curl -s --max-time 180 "https://www.priceslicr.com/api/sync-listings?secret=priceslicr-sync-2026"
      - name: Trigger CEX sync
        run: |
          curl -s --max-time 180 "https://www.priceslicr.com/api/sync-cex?secret=priceslicr-sync-2026"
      - name: Trigger Back Market sync
        run: |
          curl -s --max-time 300 "https://www.priceslicr.com/api/sync-backmarket?secret=priceslicr-sync-2026"
